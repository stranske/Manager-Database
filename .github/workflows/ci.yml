# Thin caller for Python CI - delegates to Workflows repo reusable workflow
# No local scripts required - all logic is centralized in stranske/Workflows
#
# This workflow runs:
# - Lint (Ruff)
# - Format check (Black)
# - Type checking (mypy)
# - Tests (pytest) on Python 3.12 and 3.13
#
# NOTE: Do NOT add a top-level 'permissions:' block here. It causes
# startup_failure when calling reusable workflows. The reusable workflow
# defines its own permissions.
#
# Copy this file to: .github/workflows/ci.yml
# Also copy: autofix-versions.env to .github/workflows/autofix-versions.env
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python CI
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      typecheck: true
      coverage: true
      coverage-min: '78'
    secrets: inherit

  postgres-integration:
    name: Postgres chain integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MGRDB_PG_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run Postgres chain integration tests
        run: pytest tests/test_chain_postgres_integration.py -v
