x-shared-db-env: &shared-db-env
  DB_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres

x-shared-minio-env: &shared-minio-env
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
  MINIO_REGION: us-east-1
  MINIO_BUCKET: filings

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./alembic:/alembic:ro

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  etl:
    build: ./etl
    volumes:
      - ./etl:/code
      - ./alembic:/code/alembic:ro
      - ./alembic.ini:/code/alembic.ini:ro
      - ./schema.sql:/code/schema.sql:ro
    environment:
      <<: [*shared-db-env, *shared-minio-env]
      UK_COMPANY_NUMBERS: ${UK_COMPANY_NUMBERS:-}
    depends_on:
      - db
      - minio

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn api.chat:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      <<: [*shared-db-env, *shared-minio-env]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/detailed', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    volumes:
      - ./ui:/app
    environment:
      <<: [*shared-db-env, *shared-minio-env]
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_started
      api:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
