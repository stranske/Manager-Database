services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./alembic:/alembic:ro

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  etl:
    build: ./etl
    volumes:
      - ./etl:/code
      - ./alembic:/code/alembic:ro
      - ./alembic.ini:/code/alembic.ini:ro
      - ./schema.sql:/code/schema.sql:ro
    environment:
      DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      UK_COMPANY_NUMBERS: ${UK_COMPANY_NUMBERS:-}
    depends_on:
      - db
      - minio

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: uvicorn api.chat:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: us-east-1
      MINIO_BUCKET: filings
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    volumes:
      - ./ui:/app
    environment:
      DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
    ports:
      - "8501:8501"
    depends_on:
      - db
      - api

volumes:
  pgdata:
  miniodata:
