[mypy]
ignore_missing_imports = true
explicit_package_bases = true
warn_return_any = false
warn_unused_ignores = false
check_untyped_defs = false
disallow_untyped_defs = false

# Exclude directories with type issues
exclude = (^|.*/)(scripts|etl|adapters|api)/|(^|.*/)embeddings\.py$

# Ignore untyped imports for specific modules without stubs
[mypy-boto3.*]
ignore_missing_imports = true
ignore_errors = true

[mypy-pandas.*]
ignore_missing_imports = true
ignore_errors = true

[mypy-scripts.langchain.*]
ignore_missing_imports = true
ignore_errors = true

[mypy-semantic_matcher]
ignore_missing_imports = true
ignore_errors = true

[mypy-label_matcher]
ignore_missing_imports = true
ignore_errors = true

[mypy-issue_dedup]
ignore_missing_imports = true
ignore_errors = true

[mypy-integration_layer]
ignore_missing_imports = true
ignore_errors = true
