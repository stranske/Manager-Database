<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manager-Database Offline Demo</title>
    <script type="module">
      import { mount } from "./vendor/stlite/browser-0.80.4/build/stlite.js";

      const textFiles = [
        "wasm_app.py",
        "embeddings.py",
        "ui/__init__.py",
        "ui/dashboard.py",
        "ui/daily_report.py",
        "ui/search.py",
        "ui/upload.py",
        "api/__init__.py",
        "api/_compat.py",
        "api/activism.py",
        "api/search.py",
        "api/signals.py",
        "adapters/__init__.py",
        "adapters/base.py",
        "utils/__init__.py",
        "utils/extract.py"
      ];

      const files = {};
      for (const path of textFiles) {
        files[path] = await fetch(path).then((response) => response.text());
      }
      files["manager_demo.sqlite"] = {
        url: "manager_demo.sqlite",
        encoding: "binary"
      };

      await mount(
        {
          entrypoint: "wasm_app.py",
          files,
          requirements: [],
          prebuiltPackageNames: ["pandas", "altair", "httpx"],
          pyodideUrl: "./vendor/pyodide/v0.27.3/full/pyodide.mjs",
          wheelUrls: {
            stliteLib: "./vendor/stlite/browser-0.80.4/build/wheels/stlite_lib-0.1.0-py3-none-any.whl",
            streamlit: "./vendor/stlite/browser-0.80.4/build/wheels/streamlit-1.41.0-cp312-none-any.whl"
          },
          env: {
            UI_OFFLINE: "1",
            USE_SIMPLE_EMBED: "1"
          }
        },
        document.getElementById("root")
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
